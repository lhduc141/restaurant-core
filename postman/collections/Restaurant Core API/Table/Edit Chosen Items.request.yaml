$kind: http-request
name: Edit Chosen Items
url: "{{base_url}}/table/v1/menu/{{session_id}}/choose"
method: PUT
headers:
  Authorization: Bearer {{staff_token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "items": [
        {
          "itemID": {{item_id}},
          "quantity": 1,
          "note": "No onion",
          "deleted": false
        }
      ]
    }
order: 3500
